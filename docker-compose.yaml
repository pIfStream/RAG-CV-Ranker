version: '3.8'

services:
  # Database Service (Postgres with pgvector extension)
  db:
    image: ankane/pgvector:latest
    container_name: cv_postgres_db
    restart: always
    environment:
      - POSTGRES_USER=myuser
      - POSTGRES_PASSWORD=mypassword
      - POSTGRES_DB=cv_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: